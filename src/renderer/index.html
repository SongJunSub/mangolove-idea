<!doctype html>
<!-- Default the first paint to dark (the recommended default); lib/theme.ts corrects
     it from the persisted `theme` setting on first render. A user who persisted
     'light' may see a brief dark frame until that resolves — acceptable (the CSP
     blocks an inline pre-paint script, and the settings read is a fast local IPC). -->

<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; worker-src 'self' blob:"
    />
    <title>MangoLove IDEA</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
